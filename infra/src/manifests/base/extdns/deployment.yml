apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-external-dns
  namespace: career-roadmap-app
  labels:
    app.kubernetes.io/name: api-external-dns
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: api-external-dns
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-external-dns
    spec:
      serviceAccountName: ingress-external-dns-serviceaccount
      containers:
        - name: api-external-dns
          image: registry.k8s.io/external-dns/external-dns:v0.14.0
          args:
            - --source=ingress
            - --domain-filter=career-roadmap-api.app
            - --provider=aws
            - --policy=upsert-only
            - --aws-zone-type=public
            - --registry=txt
            - --txt-owner-id=api-external-dns
          env:
            - name: AWS_DEFAULT_REGION
              value: ap-northeast-1