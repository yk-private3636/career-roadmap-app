apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: api-external-dns
  labels:
    app.kubernetes.io/name: api-external-dns
rules:
  - apiGroups: [""]
    resources: ["services","endpoints","pods","nodes"]
    verbs: ["get","watch","list"]
  - apiGroups: ["extensions","networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get","watch","list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: api-external-dns-viewer
  labels:
    app.kubernetes.io/name: api-external-dns
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: api-external-dns
subjects:
  - kind: ServiceAccount
    name: ingress-external-dns-serviceaccount
    namespace: career-roadmap-app